name: Leaderboard

on:
  pull_request:
    paths: ["scores/**"]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all submissions against the allowlist
        run: python3 scripts/build_board.py --validate-only

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build board
        run: |
          python3 scripts/build_board.py
          touch site/.nojekyll
      - name: Publish to gh-pages branch
        run: |
          cd site
          git init -q -b gh-pages
          git config user.name "leaderboard-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -q -m "deploy board $(date -u +%Y-%m-%dT%H:%M)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
